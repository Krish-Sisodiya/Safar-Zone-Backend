spring.application.name=safar-zone-backend

# Server Configuration
server.port=8080

# MySQL Database (Production Secure Config)
spring.datasource.url=jdbc:mysql://${DB_HOST:mysql-17dc237f-krishsisodiya7389-c60d.k.aivencloud.com}:${DB_PORT:20026}/${DB_NAME:defaultdb}?useSSL=true&allowPublicKeyRetrieval=true
spring.datasource.username=${DB_USER:avnadmin}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jackson.time-zone=Asia/Kolkata

# JWT Secret (Production environment variable)
app.jwt.secret=${JWT_SECRET:SafarZoneSecretKeyMustBeAtLeast256BitsLongForHS256!@#}
app.jwt.expiration-ms=86400000

# Mail Configuration (Using environment variables)
spring.mail.host=smtp-relay.brevo.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.socketFactory.port=465
spring.mail.properties.mail.smtp.socketFactory.class=javax.net.ssl.SSLSocketFactory
spring.mail.properties.mail.smtp.socketFactory.fallback=false
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=10000
spring.mail.properties.mail.smtp.timeout=10000
spring.mail.properties.mail.smtp.writetimeout=10000

# ===== FILE UPLOAD CONFIG =====
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
# Temporary root folder for cloud deployment
app.upload-dir=${UPLOAD_DIR:/tmp/safar-uploads}

# Swagger/OpenAPI Config
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operations-sorter=method
springdoc.swagger-ui.tags-sorter=alpha
springdoc.swagger-ui.display-request-duration=true

# =====================================================
# RAZORPAY
# =====================================================
razorpay.key.id=${RAZORPAY_KEY_ID:rzp_test_StCIifU5u85oRJ}
razorpay.key.secret=${RAZORPAY_KEY_SECRET:Hxy3m53ypESmOWx4CzRgtIWq}

# CORS (Allow Expo/React Native)
app.cors.allowed-origins=http://localhost:3000,http://localhost:5173,http://localhost:8081,exp://*,https://safarzone.com,https://*.safarzone.com,https://*.ngrok-free.dev

logging.level.org.springframework.web.cors=DEBUG
logging.level.com.safar_zone_backend.config.CorsConfig=DEBUG